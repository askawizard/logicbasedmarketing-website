<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>LBM Site Editor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23c8f65a'/><text x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='20' fill='%230a0a0a'>E</text></svg>">
<!-- GrapesJS Core -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/grapesjs/0.21.10/css/grapes.min.css">
<!-- GrapesJS Preset Webpage Plugin CSS -->
<style>
  /* ── AUTH SCREEN ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black:  #0a0a0a;
    --dark:   #111111;
    --card:   #161616;
    --border: #1e1e1e;
    --accent: #c8f65a;
    --accent-dim: rgba(200,246,90,0.10);
    --text:   #efefef;
    --muted:  #6b6b6b;
    --white:  #ffffff;
    --red:    #ff5252;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--text);
    overflow: hidden;
  }

  #auth-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: var(--black);
  }
  #auth-screen.hidden { display: none; }

  .auth-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    width: 400px;
    text-align: center;
  }
  .auth-box h1 {
    font-size: 20px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .auth-box h1 span { color: var(--accent); }
  .auth-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .auth-input {
    width: 100%; padding: 14px 16px;
    background: var(--black); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    outline: none; margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: var(--black);
    font-weight: 800; font-size: 14px;
    border: none; border-radius: 8px; cursor: pointer;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: background 0.2s;
  }
  .auth-btn:hover { background: #d4f96a; }
  .auth-error {
    color: var(--red); font-size: 12px;
    margin-top: 12px; display: none;
  }

  /* ── EDITOR TOOLBAR ── */
  #editor-app { display: none; height: 100vh; }
  #editor-app.active { display: flex; flex-direction: column; }

  .editor-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }
  .toolbar-left { display: flex; align-items: center; gap: 16px; }
  .toolbar-logo {
    font-size: 12px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent);
  }
  .toolbar-logo span { color: var(--white); }

  .page-selector {
    padding: 8px 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
    outline: none; cursor: pointer;
    min-width: 240px;
  }
  .page-selector:focus { border-color: var(--accent); }
  .page-selector option { background: var(--card); color: var(--text); }

  .toolbar-right { display: flex; align-items: center; gap: 10px; }

  .toolbar-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .btn-secondary {
    background: var(--card); color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent); color: var(--black); border-color: var(--accent);
    font-weight: 800;
  }
  .btn-primary:hover { background: #d4f96a; }
  .btn-danger {
    background: transparent; color: var(--red); border-color: var(--red);
  }
  .btn-danger:hover { background: rgba(255,82,82,0.1); }

  .save-status {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .save-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
  }
  .save-dot.modified { background: #ffa726; }
  .save-dot.saving { background: var(--accent); animation: pulse 1s infinite; }
  .save-dot.saved { background: #4caf50; }
  .save-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── EDITOR CANVAS ── */
  .editor-container {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  #gjs {
    flex: 1;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* ── GRAPESJS OVERRIDES ── */
  .gjs-one-bg { background-color: var(--dark) !important; }
  .gjs-two-color { color: var(--text) !important; }
  .gjs-three-bg { background-color: var(--card) !important; }
  .gjs-four-color, .gjs-four-color-h:hover { color: var(--accent) !important; }

  .gjs-pn-panels { background: var(--dark) !important; }
  .gjs-pn-panel { background: var(--dark) !important; }
  .gjs-pn-views-container { background: var(--dark) !important; border-left: 1px solid var(--border) !important; }
  .gjs-pn-views { border-bottom: 1px solid var(--border) !important; }

  .gjs-block {
    background: var(--card) !important;
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    color: var(--text) !important;
    min-height: 70px !important;
  }
  .gjs-block:hover { border-color: var(--accent) !important; }
  .gjs-block__media svg { fill: var(--accent) !important; }

  .gjs-sm-sector-title,
  .gjs-clm-tags .gjs-clm-tag {
    background: var(--card) !important;
    border-color: var(--border) !important;
    color: var(--text) !important;
  }

  .gjs-field { background: var(--black) !important; border-color: var(--border) !important; color: var(--text) !important; }
  .gjs-field input, .gjs-field select { color: var(--text) !important; }

  .gjs-cv-canvas { background: #1a1a1a !important; }

  /* Layer manager */
  .gjs-layer-name { color: var(--text) !important; }
  .gjs-layers { background: var(--dark) !important; }

  /* Rich Text Editor toolbar */
  .gjs-rte-toolbar { background: var(--card) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; }
  .gjs-rte-actionbar { background: var(--card) !important; }
  .gjs-rte-action { color: var(--text) !important; border-color: var(--border) !important; }
  .gjs-rte-action:hover { color: var(--accent) !important; }

  /* Toast notification */
  .editor-toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    z-index: 10000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .editor-toast.show { transform: translateY(0); opacity: 1; }
  .editor-toast.success { border-color: #4caf50; color: #4caf50; }
  .editor-toast.error { border-color: var(--red); color: var(--red); }
  .editor-toast.info { border-color: var(--accent); color: var(--accent); }

  /* Confirm modal */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
  }
  .confirm-overlay.show { display: flex; }
  .confirm-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 440px;
    text-align: center;
  }
  .confirm-box h3 { font-size: 16px; margin-bottom: 8px; }
  .confirm-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
  .confirm-actions { display: flex; gap: 12px; justify-content: center; }
  .confirm-actions button { min-width: 120px; }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 9997;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h1><span>LBM</span> Site Editor</h1>
    <p>Enter your editor password to continue</p>
    <input type="password" class="auth-input" id="auth-password" placeholder="Password" autocomplete="off">
    <button class="auth-btn" id="auth-submit">Unlock Editor</button>
    <div class="auth-error" id="auth-error">Invalid password. Try again.</div>
  </div>
</div>

<!-- EDITOR APP -->
<div id="editor-app">
  <!-- Toolbar -->
  <div class="editor-toolbar">
    <div class="toolbar-left">
      <div class="toolbar-logo"><span>LBM</span> Editor</div>
      <select class="page-selector" id="page-selector">
        <option value="">Select a page to edit...</option>
      </select>
      <div class="save-status" id="save-status">
        <span class="save-dot" id="save-dot"></span>
        <span id="save-text">No changes</span>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn btn-secondary" id="btn-preview" title="Preview in new tab">Preview</button>
      <button class="toolbar-btn btn-secondary" id="btn-undo" title="Undo">Undo</button>
      <button class="toolbar-btn btn-secondary" id="btn-redo" title="Redo">Redo</button>
      <button class="toolbar-btn btn-danger" id="btn-discard" title="Discard all changes">Discard</button>
      <button class="toolbar-btn btn-primary" id="btn-publish" title="Save & deploy to live site">Publish</button>
    </div>
  </div>

  <!-- GrapesJS Editor -->
  <div class="editor-container">
    <div id="gjs"></div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirm-modal">
  <div class="confirm-box">
    <h3 id="confirm-title">Confirm Action</h3>
    <p id="confirm-message">Are you sure?</p>
    <div class="confirm-actions">
      <button class="toolbar-btn btn-secondary" id="confirm-cancel">Cancel</button>
      <button class="toolbar-btn btn-primary" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<!-- Toast -->
<div class="editor-toast" id="toast"></div>

<!-- GrapesJS Core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/grapesjs/0.21.10/grapes.min.js"></script>
<!-- GrapesJS Preset Webpage Plugin -->
<script src="https://cdn.jsdelivr.net/npm/grapesjs-preset-webpage@1.0.3/dist/index.js"></script>
<!-- GrapesJS Blocks Basic -->
<script src="https://cdn.jsdelivr.net/npm/grapesjs-blocks-basic@1.0.2/dist/index.js"></script>
<!-- GrapesJS Custom Code -->
<script src="https://cdn.jsdelivr.net/npm/grapesjs-custom-code@1.0.2/dist/index.js"></script>

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════
  const WORKER_URL = 'https://lbm-editor.thewizard-dd8.workers.dev';
  const SITE_URL = 'https://logicbasedmarketing.com';

  // Page registry — all editable pages
  const PAGES = [
    { slug: 'index.html', label: 'Homepage', path: '/' },
    { slug: 'calculator.html', label: 'All-In CAC Calculator', path: '/calculator' },
    { slug: 'calculator-landing.html', label: 'Calculator Landing Page', path: '/calculator-landing' },
    { slug: 'blog.html', label: 'Blog Index', path: '/blog' },
    { slug: 'vegas.html', label: 'Las Vegas (Local SEO)', path: '/vegas' },
    { slug: 'pricing.html', label: 'Pricing (Sales Tool)', path: '/pricing' },
    { slug: 'one-pager.html', label: 'One-Pager (Sales Tool)', path: '/one-pager' },
    { slug: 'proposal.html', label: 'Proposal (Sales Tool)', path: '/proposal' },
    { slug: 'thank-you.html', label: 'Thank You Page', path: '/thank-you' },
    { slug: 'privacy.html', label: 'Privacy Policy', path: '/privacy' },
    // Blog posts
    { slug: 'blog/10m-wall.html', label: 'Blog: The $10M Wall', path: '/blog/10m-wall' },
    { slug: 'blog/23-signs-revenue-operations-broken.html', label: 'Blog: 23 Signs RevOps Broken', path: '/blog/23-signs-revenue-operations-broken' },
    { slug: 'blog/best-tools-fractional-cro-revops.html', label: 'Blog: Best Tools for Fractional CRO', path: '/blog/best-tools-fractional-cro-revops' },
    { slug: 'blog/cac30-metric.html', label: 'Blog: CAC30 Metric', path: '/blog/cac30-metric' },
    { slug: 'blog/customer-acquisition-cost-statistics-2026.html', label: 'Blog: CAC Statistics 2026', path: '/blog/customer-acquisition-cost-statistics-2026' },
    { slug: 'blog/customer-acquisition-cost-statistics.html', label: 'Blog: CAC Statistics', path: '/blog/customer-acquisition-cost-statistics' },
    { slug: 'blog/founder-guide-revenue-operations.html', label: 'Blog: Founder Guide to RevOps', path: '/blog/founder-guide-revenue-operations' },
    { slug: 'blog/fully-loaded-blended-cac.html', label: 'Blog: Fully Loaded All-In CAC', path: '/blog/fully-loaded-blended-cac' },
    { slug: 'blog/how-to-fire-bad-marketing-vendor.html', label: 'Blog: How to Fire a Bad Vendor', path: '/blog/how-to-fire-bad-marketing-vendor' },
    { slug: 'blog/marketing-attribution-guide.html', label: 'Blog: Marketing Attribution Guide', path: '/blog/marketing-attribution-guide' },
    { slug: 'blog/marketing-attribution-statistics.html', label: 'Blog: Attribution Statistics', path: '/blog/marketing-attribution-statistics' },
    { slug: 'blog/pre-growth-hire-checklist.html', label: 'Blog: Pre-Growth Hire Checklist', path: '/blog/pre-growth-hire-checklist' },
    { slug: 'blog/revenue-leak-audit-process.html', label: 'Blog: Revenue Leak Audit Process', path: '/blog/revenue-leak-audit-process' },
    { slug: 'blog/revenue-leak-report.html', label: 'Blog: Revenue Leak Report', path: '/blog/revenue-leak-report' },
    { slug: 'blog/revenue-operations-small-business.html', label: 'Blog: RevOps for Small Business', path: '/blog/revenue-operations-small-business' },
    { slug: 'blog/revenue-operations-statistics-2026.html', label: 'Blog: RevOps Statistics 2026', path: '/blog/revenue-operations-statistics-2026' },
    { slug: 'blog/revenue-operations-statistics.html', label: 'Blog: RevOps Statistics', path: '/blog/revenue-operations-statistics' },
    { slug: 'blog/what-40-businesses-taught-real-cac.html', label: 'Blog: What 40 Businesses Taught About CAC', path: '/blog/what-40-businesses-taught-real-cac' },
  ];

  // ═══════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════
  let authToken = null;
  let editor = null;
  let currentPage = null;
  let originalHtml = '';
  let hasChanges = false;

  // ═══════════════════════════════════════════
  // DOM REFS
  // ═══════════════════════════════════════════
  const $authScreen = document.getElementById('auth-screen');
  const $authPassword = document.getElementById('auth-password');
  const $authSubmit = document.getElementById('auth-submit');
  const $authError = document.getElementById('auth-error');
  const $editorApp = document.getElementById('editor-app');
  const $pageSelector = document.getElementById('page-selector');
  const $saveDot = document.getElementById('save-dot');
  const $saveText = document.getElementById('save-text');
  const $btnPreview = document.getElementById('btn-preview');
  const $btnUndo = document.getElementById('btn-undo');
  const $btnRedo = document.getElementById('btn-redo');
  const $btnDiscard = document.getElementById('btn-discard');
  const $btnPublish = document.getElementById('btn-publish');
  const $confirmModal = document.getElementById('confirm-modal');
  const $confirmTitle = document.getElementById('confirm-title');
  const $confirmMessage = document.getElementById('confirm-message');
  const $confirmCancel = document.getElementById('confirm-cancel');
  const $confirmOk = document.getElementById('confirm-ok');
  const $loading = document.getElementById('loading-overlay');
  const $toast = document.getElementById('toast');

  // ═══════════════════════════════════════════
  // UTILITIES
  // ═══════════════════════════════════════════
  function showToast(message, type = 'info', duration = 3000) {
    $toast.textContent = message;
    $toast.className = `editor-toast ${type} show`;
    setTimeout(() => { $toast.classList.remove('show'); }, duration);
  }

  function showLoading() { $loading.classList.add('show'); }
  function hideLoading() { $loading.classList.remove('show'); }

  function confirm(title, message) {
    return new Promise((resolve) => {
      $confirmTitle.textContent = title;
      $confirmMessage.textContent = message;
      $confirmModal.classList.add('show');
      const cleanup = () => { $confirmModal.classList.remove('show'); };
      $confirmOk.onclick = () => { cleanup(); resolve(true); };
      $confirmCancel.onclick = () => { cleanup(); resolve(false); };
    });
  }

  function updateSaveStatus(state, text) {
    $saveDot.className = `save-dot ${state}`;
    $saveText.textContent = text;
  }

  async function apiCall(endpoint, data = {}) {
    const res = await fetch(`${WORKER_URL}${endpoint}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `API error ${res.status}`);
    return json;
  }

  // ═══════════════════════════════════════════
  // AUTH
  // ═══════════════════════════════════════════
  async function authenticate() {
    const password = $authPassword.value.trim();
    if (!password) return;

    $authSubmit.textContent = 'Authenticating...';
    $authSubmit.disabled = true;

    try {
      const res = await fetch(`${WORKER_URL}/api/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();

      if (data.token) {
        authToken = data.token;
        sessionStorage.setItem('lbm_editor_token', authToken);
        $authScreen.classList.add('hidden');
        $editorApp.classList.add('active');
        initEditor();
      } else {
        $authError.style.display = 'block';
      }
    } catch (e) {
      $authError.textContent = 'Connection error. Is the editor worker running?';
      $authError.style.display = 'block';
    }

    $authSubmit.textContent = 'Unlock Editor';
    $authSubmit.disabled = false;
  }

  // Check for existing session
  function checkSession() {
    const token = sessionStorage.getItem('lbm_editor_token');
    if (token) {
      authToken = token;
      $authScreen.classList.add('hidden');
      $editorApp.classList.add('active');
      initEditor();
    }
  }

  $authSubmit.addEventListener('click', authenticate);
  $authPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') authenticate(); });

  // ═══════════════════════════════════════════
  // GRAPESJS INIT
  // ═══════════════════════════════════════════
  function initEditor() {
    // Populate page selector
    PAGES.forEach(page => {
      const opt = document.createElement('option');
      opt.value = page.slug;
      opt.textContent = page.label;
      $pageSelector.appendChild(opt);
    });

    // Initialize GrapesJS
    editor = grapesjs.init({
      container: '#gjs',
      height: '100%',
      width: 'auto',
      fromElement: false,
      storageManager: false, // We handle storage ourselves
      canvas: {
        styles: [
          'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap'
        ]
      },
      plugins: ['grapesjs-preset-webpage', 'gjs-blocks-basic', 'grapesjs-custom-code'],
      pluginsOpts: {
        'grapesjs-preset-webpage': {
          blocksBasicOpts: { flexGrid: true },
          navbarOpts: false,
          countdownOpts: false,
          formsOpts: false,
        },
        'gjs-blocks-basic': {
          flexGrid: true,
          stylePrefix: 'lbm-',
        }
      },
      // Device manager for responsive preview
      deviceManager: {
        devices: [
          { name: 'Desktop', width: '' },
          { name: 'Tablet', width: '768px', widthMedia: '992px' },
          { name: 'Mobile', width: '375px', widthMedia: '480px' },
        ]
      },
      // Style manager sectors
      styleManager: {
        sectors: [
          {
            name: 'Typography',
            open: true,
            properties: [
              { property: 'font-family', type: 'select',
                options: [
                  { id: "'Inter', sans-serif", label: 'Inter' },
                  { id: 'Arial, sans-serif', label: 'Arial' },
                  { id: 'Georgia, serif', label: 'Georgia' },
                  { id: "'Courier New', monospace", label: 'Courier New' },
                ]
              },
              { property: 'font-size' },
              { property: 'font-weight' },
              { property: 'letter-spacing' },
              { property: 'color' },
              { property: 'line-height' },
              { property: 'text-align' },
              { property: 'text-decoration' },
              { property: 'text-transform' },
            ]
          },
          {
            name: 'Layout',
            open: false,
            properties: [
              { property: 'display' },
              { property: 'flex-direction' },
              { property: 'justify-content' },
              { property: 'align-items' },
              { property: 'gap' },
              { property: 'padding' },
              { property: 'margin' },
              { property: 'width' },
              { property: 'max-width' },
              { property: 'height' },
              { property: 'overflow' },
            ]
          },
          {
            name: 'Background',
            open: false,
            properties: [
              { property: 'background-color' },
              { property: 'background-image' },
              { property: 'background-size' },
              { property: 'background-position' },
              { property: 'background-repeat' },
            ]
          },
          {
            name: 'Border',
            open: false,
            properties: [
              { property: 'border-radius' },
              { property: 'border' },
              { property: 'box-shadow' },
            ]
          },
          {
            name: 'Position',
            open: false,
            properties: [
              { property: 'position' },
              { property: 'top' },
              { property: 'right' },
              { property: 'bottom' },
              { property: 'left' },
              { property: 'z-index' },
            ]
          }
        ]
      },
    });

    // Add custom LBM blocks
    addLBMBlocks();

    // Track changes
    editor.on('change:changesCount', () => {
      if (currentPage) {
        hasChanges = true;
        updateSaveStatus('modified', 'Unsaved changes');
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        publishPage();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        if (!e.shiftKey) { e.preventDefault(); editor.UndoManager.undo(); }
        else { e.preventDefault(); editor.UndoManager.redo(); }
      }
    });

    showToast('Editor ready. Select a page to begin.', 'info');
  }

  // ═══════════════════════════════════════════
  // PAGE LOADING
  // ═══════════════════════════════════════════
  async function loadPage(slug) {
    if (!slug) return;

    if (hasChanges) {
      const proceed = await confirm(
        'Unsaved Changes',
        'You have unsaved changes on the current page. Loading a new page will discard them. Continue?'
      );
      if (!proceed) {
        $pageSelector.value = currentPage;
        return;
      }
    }

    showLoading();
    updateSaveStatus('', 'Loading...');

    try {
      const result = await apiCall('/api/load', { slug });
      originalHtml = result.html;
      currentPage = slug;

      // Parse and load into GrapesJS
      const parser = new DOMParser();
      const doc = parser.parseFromString(result.html, 'text/html');

      // Collect all CSS: inline <style> tags + external <link> hrefs
      const inlineStyles = [];
      doc.querySelectorAll('style').forEach(s => inlineStyles.push(s.textContent));
      const linkHrefs = [];
      doc.querySelectorAll('link[rel="stylesheet"]').forEach(l => linkHrefs.push(l.href));

      // Get body content (strip <script> tags so GrapesJS doesn't choke)
      const bodyClone = doc.body.cloneNode(true);
      bodyClone.querySelectorAll('script').forEach(s => s.remove());
      const bodyContent = bodyClone.innerHTML;

      // Set components (HTML) and styles (CSS) in GrapesJS
      editor.setComponents(bodyContent);
      editor.setStyle(inlineStyles.join('\n'));

      // Inject actual page CSS + fonts into the canvas iframe
      const frameEl = editor.Canvas.getFrameEl();
      if (frameEl && frameEl.contentDocument) {
        const iframeHead = frameEl.contentDocument.head;

        // Add Inter font
        const fontLink = frameEl.contentDocument.createElement('link');
        fontLink.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap';
        fontLink.rel = 'stylesheet';
        iframeHead.appendChild(fontLink);

        // Add external stylesheets from the original page
        linkHrefs.forEach(href => {
          const link = frameEl.contentDocument.createElement('link');
          link.href = href;
          link.rel = 'stylesheet';
          iframeHead.appendChild(link);
        });

        // Add inline styles as a <style> tag in the iframe
        if (inlineStyles.length) {
          const styleEl = frameEl.contentDocument.createElement('style');
          styleEl.textContent = inlineStyles.join('\n');
          iframeHead.appendChild(styleEl);
        }

        // Set iframe body background to match the site
        frameEl.contentDocument.body.style.background = '#0a0a0a';
        frameEl.contentDocument.body.style.margin = '0';
      }

      hasChanges = false;
      editor.UndoManager.clear();
      updateSaveStatus('saved', 'Loaded — no changes');
      showToast(`Loaded: ${PAGES.find(p => p.slug === slug)?.label}`, 'success');

    } catch (e) {
      showToast(`Failed to load page: ${e.message}`, 'error', 5000);
      updateSaveStatus('error', 'Load failed');
    }

    hideLoading();
  }

  // ═══════════════════════════════════════════
  // PAGE SAVING / PUBLISHING
  // ═══════════════════════════════════════════
  async function publishPage() {
    if (!currentPage) {
      showToast('No page selected', 'error');
      return;
    }
    if (!hasChanges) {
      showToast('No changes to publish', 'info');
      return;
    }

    const pageName = PAGES.find(p => p.slug === currentPage)?.label || currentPage;
    const proceed = await confirm(
      'Publish Changes',
      `This will save your changes to "${pageName}" and deploy them to the live site. The update will be live in ~30 seconds. Continue?`
    );
    if (!proceed) return;

    showLoading();
    updateSaveStatus('saving', 'Publishing...');

    try {
      // Rebuild the full HTML document
      const parser = new DOMParser();
      const doc = parser.parseFromString(originalHtml, 'text/html');

      // Get updated content from GrapesJS
      const updatedBody = editor.getHtml();
      const updatedCss = editor.getCss();

      // Replace body content
      doc.body.innerHTML = updatedBody;

      // Update or add style tag with editor CSS
      let editorStyle = doc.querySelector('style[data-gjs]');
      if (!editorStyle) {
        editorStyle = doc.createElement('style');
        editorStyle.setAttribute('data-gjs', 'true');
        // Insert after last existing style tag in head
        const lastStyle = doc.head.querySelector('style:last-of-type');
        if (lastStyle) {
          lastStyle.after(editorStyle);
        } else {
          doc.head.appendChild(editorStyle);
        }
      }
      editorStyle.textContent = updatedCss;

      const fullHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

      await apiCall('/api/save', {
        slug: currentPage,
        html: fullHtml,
        message: `Editor: update ${currentPage}`
      });

      originalHtml = fullHtml;
      hasChanges = false;
      updateSaveStatus('saved', 'Published — deploying...');
      showToast('Published! Changes will be live in ~30 seconds.', 'success', 5000);

      // After 30s, update status
      setTimeout(() => {
        if (!hasChanges) updateSaveStatus('saved', 'Live');
      }, 30000);

    } catch (e) {
      showToast(`Publish failed: ${e.message}`, 'error', 5000);
      updateSaveStatus('error', 'Publish failed');
    }

    hideLoading();
  }

  // ═══════════════════════════════════════════
  // TOOLBAR ACTIONS
  // ═══════════════════════════════════════════
  $pageSelector.addEventListener('change', () => loadPage($pageSelector.value));

  $btnPreview.addEventListener('click', () => {
    if (!currentPage) return;
    const page = PAGES.find(p => p.slug === currentPage);
    if (page) window.open(SITE_URL + page.path, '_blank');
  });

  $btnUndo.addEventListener('click', () => { if (editor) editor.UndoManager.undo(); });
  $btnRedo.addEventListener('click', () => { if (editor) editor.UndoManager.redo(); });

  $btnDiscard.addEventListener('click', async () => {
    if (!hasChanges || !currentPage) return;
    const proceed = await confirm('Discard Changes', 'This will revert all changes to the last saved version. This cannot be undone.');
    if (proceed) {
      $pageSelector.dispatchEvent(new Event('change'));
      showToast('Changes discarded', 'info');
    }
  });

  $btnPublish.addEventListener('click', publishPage);

  // Warn on page leave with unsaved changes
  window.addEventListener('beforeunload', (e) => {
    if (hasChanges) {
      e.preventDefault();
      e.returnValue = 'You have unsaved changes.';
    }
  });

  checkSession();
